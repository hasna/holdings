services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: holdings
      POSTGRES_USER: holdings
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U holdings"]
      interval: 5s
      retries: 10
  serve:
    image: oven/bun:1
    # --package selects the correct bin; a bare `bunx @hasna/holdings holdings-serve`
    # would run the default CLI and treat "holdings-serve" as a bogus arg.
    command: ["bunx", "--package", "@hasna/holdings", "holdings-serve"]
    environment:
      HASNA_HOLDINGS_STORAGE_MODE: cloud
      HASNA_HOLDINGS_DATABASE_URL_FILE: /run/secrets/database_url
      HASNA_HOLDINGS_PORT: "3489"
      HASNA_HOLDINGS_BIND_HOST: "0.0.0.0"
      HASNA_HOLDINGS_CORS_ORIGINS: ${CORS_ORIGINS:-}
      HASNA_HOLDINGS_API_CREDENTIALS: ${HOLDINGS_API_CREDENTIALS:-}
    secrets: [database_url]
    depends_on: { db: { condition: service_healthy } }
    ports: ["3489:3489"]
  mcp:
    image: oven/bun:1
    # --package selects the MCP bin; a bare `bunx @hasna/holdings holdings-mcp` would run
    # the CLI and treat "holdings-mcp" as a bogus argument. (BUILD-SPEC §6.4)
    command: ["bunx", "--package", "@hasna/holdings", "holdings-mcp", "--http", "--port", "8893"]
    environment:
      HASNA_HOLDINGS_STORAGE_MODE: cloud
      HASNA_HOLDINGS_DATABASE_URL_FILE: /run/secrets/database_url
      MCP_HTTP: "1"
      MCP_HTTP_PORT: "8893"
      # Bind 0.0.0.0 so the published 8893 is reachable; the default loopback
      # bind is invisible to Docker port forwarding. A non-loopback bind forces auth
      # ON and is asserted fail-closed at startup (assertMcpServeSafety), satisfied
      # here by wiring API_CREDENTIALS. Never publish this port without credentials.
      HASNA_HOLDINGS_MCP_BIND_HOST: "0.0.0.0"
      HASNA_HOLDINGS_API_CREDENTIALS: ${HOLDINGS_API_CREDENTIALS:-}
    secrets: [database_url]
    depends_on: { db: { condition: service_healthy } }
    ports: ["8893:8893"]
secrets:
  pg_password:
    file: ./secrets/pg_password
  database_url:
    file: ./secrets/database_url   # postgres://holdings:<pw>@db:5432/holdings?sslmode=verify-full
volumes: { pgdata: {} }
